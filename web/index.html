<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <title>Sudoku Solver — Scan &amp; Solve</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Sudoku Solver</h1>
      <p class="tagline">Point your camera or upload a photo, fix any misreads with the pad, then solve in Rust (WASM).</p>
    </header>

    <section class="capture" id="capture-section">
      <div class="video-wrap" id="video-wrap">
        <video id="video" playsinline autoplay muted></video>
        <img id="preview-img" class="hidden" alt="Captured puzzle preview" />
        <div class="frame-guide" aria-hidden="true"></div>
        <canvas id="snap-canvas" class="hidden"></canvas>
        <canvas id="debug-canvas" class="hidden"></canvas>
      </div>
      <div class="actions actions-row">
        <button type="button" id="btn-camera" class="btn primary">Open camera</button>
        <button type="button" id="btn-snap" class="btn primary" disabled>Capture</button>
        <label class="btn secondary file-label">
          Upload photo
          <input type="file" id="file-input" accept="image/*" capture="environment" hidden />
        </label>
        <button type="button" id="btn-manual" class="btn secondary">Enter manually</button>
      </div>
      <p id="status" class="status" role="status"></p>
    </section>

    <section class="board-section hidden" id="board-section">
      <p class="hint">
        Tap a cell, then use the pad or keys <kbd>1</kbd>–<kbd>9</kbd> / <kbd>⌫</kbd>.
        <span class="low-conf-swatch"></span> low OCR confidence ·
        <span class="conflict-swatch"></span> conflict
      </p>
      <div class="board-wrap">
        <div id="board" class="board" role="grid" aria-label="Sudoku grid" tabindex="0"></div>
      </div>

      <div class="numpad" id="numpad" role="group" aria-label="Digit pad">
        <button type="button" class="pad-key" data-digit="1">1</button>
        <button type="button" class="pad-key" data-digit="2">2</button>
        <button type="button" class="pad-key" data-digit="3">3</button>
        <button type="button" class="pad-key" data-digit="4">4</button>
        <button type="button" class="pad-key" data-digit="5">5</button>
        <button type="button" class="pad-key" data-digit="6">6</button>
        <button type="button" class="pad-key" data-digit="7">7</button>
        <button type="button" class="pad-key" data-digit="8">8</button>
        <button type="button" class="pad-key" data-digit="9">9</button>
        <button type="button" class="pad-key pad-wide" data-digit="0" id="btn-erase">Erase</button>
      </div>

      <div class="actions actions-row">
        <button type="button" id="btn-solve" class="btn primary">Solve</button>
        <button type="button" id="btn-clear" class="btn secondary">Clear board</button>
        <button type="button" id="btn-rescan" class="btn secondary">New scan</button>
      </div>
      <p id="solve-status" class="status" role="status"></p>
    </section>

    <footer>
      <p>
        Native CLI OCR: <a href="https://github.com/thomasgruebl/rusty-tesseract">rusty-tesseract</a>.
        Browser OCR: improved grid detection + Tesseract.js.
        <a href="https://github.com/sn99/sudoku-solver">Source</a>
      </p>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="module" src="js/app.js?v=crop9"></script>
</body>
</html>
