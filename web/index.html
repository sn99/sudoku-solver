<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0a0f1a" />
  <meta name="description" content="Scan a Sudoku photo, fix any misreads, solve in the browser (Rust WASM)." />
  <title>Sudoku Scan &amp; Solve</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="brand">
        <span class="logo" aria-hidden="true">▣</span>
        <div>
          <h1>Sudoku Scanner</h1>
          <p class="tagline">Photo → digits → solve. All on-device.</p>
        </div>
      </div>
    </header>

    <!-- Capture: only while scanning / starting -->
    <section class="card capture" id="capture-section">
      <div class="video-wrap" id="video-wrap">
        <video id="video" playsinline autoplay muted></video>
        <img id="preview-img" class="hidden" alt="Captured puzzle" />
        <div class="frame-guide" aria-hidden="true">
          <span class="corner tl"></span>
          <span class="corner tr"></span>
          <span class="corner bl"></span>
          <span class="corner br"></span>
        </div>
        <div class="scan-overlay" id="scan-overlay">
          <p>Camera or upload a clear full-grid photo</p>
        </div>
      </div>

      <div class="actions capture-actions" id="capture-actions">
        <button type="button" id="btn-camera" class="btn primary">Camera</button>
        <button type="button" id="btn-snap" class="btn primary hidden" disabled>Capture</button>
        <label class="btn secondary file-label">
          Upload
          <input type="file" id="file-input" accept="image/*" capture="environment" hidden />
        </label>
        <button type="button" id="btn-manual" class="btn ghost">Type grid</button>
      </div>
      <p id="status" class="status" role="status"></p>
      <p id="scan-method" class="meta" aria-live="polite"></p>
    </section>

    <!-- Board: after scan / manual -->
    <section class="card board-section hidden" id="board-section">
      <div class="result-bar" id="result-bar">
        <div class="thumb-wrap hidden" id="thumb-wrap">
          <img id="thumb-img" alt="" />
        </div>
        <div class="result-meta">
          <h2 id="board-title">Grid</h2>
          <p id="result-summary" class="hint"></p>
        </div>
      </div>

      <div class="board-wrap">
        <div id="board" class="board" role="grid" aria-label="Sudoku grid" tabindex="0"></div>
      </div>

      <!-- Edit panel: only when user opts in -->
      <div class="edit-panel hidden" id="edit-panel">
        <div class="edit-panel-head">
          <p class="hint edit-hint">
            Tap a cell, then a digit. Keys <kbd>1</kbd>–<kbd>9</kbd> / <kbd>⌫</kbd> also work.
            <span class="swatch-row">
              <span class="low-conf-swatch"></span> low confidence
              <span class="conflict-swatch"></span> conflict
            </span>
          </p>
          <button type="button" id="btn-done-edit" class="btn secondary btn-sm">Done</button>
        </div>
        <div class="numpad" id="numpad" role="group" aria-label="Digit pad">
          <button type="button" class="pad-key" data-digit="1">1</button>
          <button type="button" class="pad-key" data-digit="2">2</button>
          <button type="button" class="pad-key" data-digit="3">3</button>
          <button type="button" class="pad-key" data-digit="4">4</button>
          <button type="button" class="pad-key" data-digit="5">5</button>
          <button type="button" class="pad-key" data-digit="6">6</button>
          <button type="button" class="pad-key" data-digit="7">7</button>
          <button type="button" class="pad-key" data-digit="8">8</button>
          <button type="button" class="pad-key" data-digit="9">9</button>
          <button type="button" class="pad-key pad-wide" data-digit="0" id="btn-erase">Erase</button>
        </div>
        <button type="button" id="btn-clear" class="btn ghost btn-sm clear-btn">Clear all cells</button>
      </div>

      <div class="actions board-actions" id="board-actions">
        <button type="button" id="btn-solve" class="btn primary">Solve</button>
        <button type="button" id="btn-edit" class="btn secondary">Edit cells</button>
        <button type="button" id="btn-rescan" class="btn ghost">Rescan</button>
      </div>
      <p id="solve-status" class="status" role="status"></p>
    </section>

    <footer>
      <p>
        Vision from
        <a href="https://github.com/atomic14/ar-browser-sudoku" rel="noopener">atomic14/ar-browser-sudoku</a>
        (CC0) · Rust/WASM solver ·
        <a href="https://github.com/sn99/sudoku-solver">source</a>
      </p>
    </footer>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
