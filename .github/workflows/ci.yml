name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test core
        run: cargo test -p sudoku-core
      - name: Check wasm crate
        run: cargo check -p sudoku-wasm
